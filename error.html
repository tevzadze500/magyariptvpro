<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Az oldal nem elérhető | Magyar IPTV Pro</title>
    <meta name="description" content="A keresett oldal nem létezik. Térj vissza a Magyar IPTV Pro főoldalára.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#020617">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z' fill='%2306b6d4'/><path d='M10 8.5v7l6-3.5-6-3.5z' fill='%23ffffff'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #020617 0%, #0a1628 50%, #020617 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .gradient-text {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1 { font-size: clamp(1.25rem, 3vw, 1.75rem); font-weight: 700; margin: 16px 0 8px; }
        p { color: #94a3b8; max-width: 480px; margin: 0 auto 24px; }
        a {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            color: #fff;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(6, 182, 212, 0.5); }
        a:focus-visible { outline: 2px solid #06b6d4; outline-offset: 3px; }
    </style>
</head>
<body>
    <main>
        <p class="gradient-text" style="font-size:clamp(4rem,12vw,8rem);font-weight:900;line-height:1;" aria-hidden="true">404</p>
        <h1>Ez az oldal nem érhető el</h1>
        <p>Sajnáljuk, a keresett tartalmat nem találtuk. Próbálj visszatérni a főoldalra.</p>
        <a href="/">← Vissza a főoldalra</a>
    </main>
</body>
</html>
